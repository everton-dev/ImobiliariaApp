<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Imóvel | Isaque Brito Corretor</title>
  <meta name="description" content="Detalhes do imóvel com Isaque Brito. Pirituba e Freguesia do Ó.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body, * { -webkit-tap-highlight-color: transparent; touch-action: pan-y; }

    :root {
      --bg:          #F7F4EF;
      --bg-elevated: #EFECE5;
      --surface:     #E8E3D8;
      --text:        #0D0D0B;
      --muted:       #726D66;
      --accent:      #C9A84C;
      --accent-dark: #9E7E35;
      --line:        rgba(13,13,11,0.10);
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      min-height: 100vh;
    }

    .container { max-width: 1180px; margin: 0 auto; padding: 0 56px; }
    @media (max-width: 768px) { .container { padding: 0 24px; } }

    /* NAV */
    #nav {
      position: sticky; top: 0; z-index: 200;
      background: rgba(247,244,239,0.97);
      box-shadow: 0 2px 16px rgba(13,13,11,0.08);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .nav-inner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 56px 4px 16px; max-width: 1280px; margin: 0 auto;
    }
    .nav-logo-wrap { display: flex; align-items: center; text-decoration: none; flex-shrink: 0; transition: opacity 0.2s; }
    .nav-logo-wrap:hover { opacity: 0.85; }
    .nav-logo { height: 80px; width: auto; display: block; }
    .nav-cta {
      display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px;
      background: linear-gradient(to right, var(--accent-dark) 50%, var(--accent) 50%);
      background-size: 200% 100%; background-position: 100% center;
      color: #fff; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 600;
      letter-spacing: 0.13em; text-transform: uppercase;
      text-decoration: none; border-radius: 50px; box-shadow: 0 2px 0 var(--accent-dark);
      transition: background-position 0.35s cubic-bezier(0.22,1,0.36,1), transform 0.3s;
    }
    .nav-cta:hover { background-position: 0% center; transform: translateY(-1px); }

    /* BREADCRUMB */
    .breadcrumb { padding: 20px 0 0; font-size: 0.85rem; color: var(--muted); }
    .breadcrumb a { color: var(--muted); text-decoration: none; }
    .breadcrumb a:hover { color: var(--accent-dark); }
    .breadcrumb span { margin: 0 6px; }

    /* GALERIA */
    .galeria {
      margin: 20px 0 0; border-radius: 16px; overflow: hidden;
      background: var(--surface); height: 500px; position: relative;
    }
    .galeria-main {
      width: 100%; height: 100%;
      background-size: cover; background-position: center;
      transition: background-image 0.01s;
    }
    .galeria-nav {
      position: absolute; bottom: 20px; right: 20px; display: flex; gap: 8px;
    }
    .galeria-btn {
      width: 40px; height: 40px;
      background: rgba(247,244,239,0.92); border: none; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text); transition: background 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .galeria-btn:hover { background: #fff; }
    .galeria-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
    .galeria-count {
      position: absolute; bottom: 20px; left: 20px;
      background: rgba(13,13,11,0.55); color: #fff;
      font-size: 0.78rem; font-weight: 600;
      padding: 5px 12px; border-radius: 50px;
    }
    .galeria-thumbs {
      display: flex; gap: 8px; margin-top: 10px; overflow-x: auto;
      padding-bottom: 4px; scrollbar-width: none;
    }
    .galeria-thumbs::-webkit-scrollbar { display: none; }
    .galeria-thumb {
      flex-shrink: 0; width: 80px; height: 60px;
      border-radius: 8px; border: 2px solid transparent;
      background-size: cover; background-position: center;
      background-color: var(--surface); cursor: pointer;
      transition: border-color 0.2s, opacity 0.2s;
      opacity: 0.7;
    }
    .galeria-thumb.active { border-color: var(--accent); opacity: 1; }
    .galeria-thumb:hover { opacity: 1; }
    .galeria::after {
      content: '';
      position: absolute; inset: 0; z-index: 4;
      background: url('logo-watermark.png') no-repeat center / 55%;
      mix-blend-mode: multiply;
      opacity: 0.40;
      pointer-events: none;
    }

    /* LOADING / ERROR */
    .state-msg { text-align: center; padding: 120px 0; color: var(--muted); font-size: 1.1rem; }

    /* LAYOUT DETALHE */
    .detalhe-wrap {
      display: grid; grid-template-columns: 1fr 360px;
      gap: 56px; margin: 40px 0 80px; align-items: start;
    }
    @media (max-width: 1100px) {
      .detalhe-wrap { grid-template-columns: 1fr; }
    }

    /* COLUNA ESQUERDA */
    .detalhe-tipo {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 0.82rem; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: #4A3F2F; margin-bottom: 10px;
    }
    .detalhe-tipo::before {
      content: ''; display: inline-block; width: 20px; height: 2px;
      background: var(--accent); flex-shrink: 0;
    }
    .detalhe-titulo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.6rem, 3vw, 2.5rem);
      font-weight: 900; line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 6px;
    }
    .detalhe-bairro { font-size: 1rem; color: var(--muted); margin-bottom: 32px; }

    /* FEATURES */
    .features-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 10px; margin-bottom: 36px;
    }
    .feature-item {
      background: var(--bg-elevated); border: 1px solid var(--line);
      border-radius: 10px; padding: 14px 12px; text-align: center;
    }
    .feature-icon { font-size: 1.4rem; margin-bottom: 4px; }
    .feature-val {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.2rem; font-weight: 700; color: var(--text); display: block;
    }
    .feature-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

    /* DESCRICAO */
    .secao-titulo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.2rem; font-weight: 700; margin-bottom: 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .secao-titulo::before {
      content: ''; display: inline-block; width: 16px; height: 2px;
      background: var(--accent); flex-shrink: 0;
    }

    .detalhe-desc {
      font-size: 1.02rem; line-height: 1.85; color: var(--muted);
      margin-bottom: 40px;
    }
    .detalhe-desc p + p { margin-top: 14px; }

    /* DIFERENCIAIS */
    .diferenciais-wrap { margin-bottom: 40px; }
    .diferenciais-grid {
      display: flex; flex-wrap: wrap; gap: 10px;
    }
    .dif-item {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--bg-elevated); border: 1px solid var(--line);
      border-radius: 50px; padding: 8px 16px;
      font-size: 0.88rem; color: var(--text); font-weight: 500;
      transition: border-color 0.2s;
    }
    .dif-item:hover { border-color: var(--accent); }
    .dif-icon { font-size: 1rem; flex-shrink: 0; }

    /* BAIRRO */
    .bairro-wrap {
      background: var(--bg-elevated); border: 1px solid var(--line);
      border-radius: 14px; padding: 24px 28px; margin-bottom: 40px;
    }
    .bairro-wrap p { font-size: 0.97rem; line-height: 1.75; color: var(--muted); }

    /* SIDEBAR */
    .detalhe-sidebar {
      background: var(--bg-elevated); border: 1px solid var(--line);
      border-radius: 16px; padding: 28px;
    }
    @media (min-width: 1101px) {
      .detalhe-sidebar { position: sticky; top: 96px; }
    }
    .sidebar-modalidade {
      font-family: 'DM Sans', sans-serif; font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.10em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 4px; display: inline-block; margin-bottom: 10px;
    }
    .modalidade-venda   { background: #edf4ed; color: #2d6a2d; }
    .modalidade-aluguel { background: #edf0f9; color: #2a4080; }
    .sidebar-valor {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2rem; font-weight: 900; color: var(--accent-dark); line-height: 1; margin-bottom: 4px;
    }
    .sidebar-valor small { font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 400; color: var(--muted); }
    .sidebar-consulte { font-size: 1rem; color: var(--muted); margin-bottom: 4px; }
    .sidebar-divider { border: none; border-top: 1px solid var(--line); margin: 20px 0; }
    .sidebar-info { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .sidebar-info-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
    .sidebar-info-row .s-label { color: var(--muted); }
    .sidebar-info-row .s-val   { font-weight: 600; color: var(--text); }

    .sidebar-label-cta {
      font-size: 0.8rem; color: var(--muted); text-align: center;
      margin-bottom: 10px; line-height: 1.5;
    }

    .btn-whatsapp {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 15px 20px;
      background: linear-gradient(to right, #128c3e 50%, #25d366 50%);
      background-size: 200% 100%; background-position: 100% center;
      color: #fff; text-decoration: none;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 700;
      letter-spacing: 0.05em; border-radius: 10px;
      transition: background-position 0.35s cubic-bezier(0.22,1,0.36,1), transform 0.2s;
    }
    .btn-whatsapp:hover { background-position: 0% center; transform: translateY(-2px); }

    .btn-voltar {
      display: inline-flex; align-items: center; gap: 6px; margin-top: 12px; width: 100%;
      padding: 12px 20px; background: transparent; border: 1px solid var(--line);
      color: var(--muted); text-decoration: none;
      font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500;
      border-radius: 10px; justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-voltar:hover { border-color: var(--accent); color: var(--accent-dark); }

    .sidebar-garantia {
      display: flex; align-items: center; gap: 8px;
      margin-top: 16px; padding: 12px;
      background: #f0f7f0; border-radius: 8px;
      font-size: 0.8rem; color: #2d6a2d; line-height: 1.4;
    }
    .sidebar-garantia svg { flex-shrink: 0; }

    /* CTA BANNER INFERIOR */
    .cta-banner {
      background: linear-gradient(135deg, #1a1a18 0%, #2d2820 100%);
      padding: 60px 0; margin-bottom: 0;
    }
    .cta-banner-inner {
      max-width: 780px; margin: 0 auto; text-align: center;
      padding: 0 24px;
    }
    .cta-banner h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      font-weight: 900; color: #F7F4EF; margin-bottom: 12px;
    }
    .cta-banner p { font-size: 1rem; color: rgba(247,244,239,0.65); margin-bottom: 28px; line-height: 1.6; }
    .cta-banner-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .btn-cta-primary {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 32px;
      background: linear-gradient(to right, #128c3e 50%, #25d366 50%);
      background-size: 200% 100%; background-position: 100% center;
      color: #fff; text-decoration: none;
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 700;
      letter-spacing: 0.05em; border-radius: 50px;
      transition: background-position 0.35s, transform 0.2s;
    }
    .btn-cta-primary:hover { background-position: 0% center; transform: translateY(-2px); }
    .btn-cta-secondary {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 32px;
      background: transparent; border: 1px solid rgba(247,244,239,0.25);
      color: rgba(247,244,239,0.8); text-decoration: none;
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500;
      border-radius: 50px;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-cta-secondary:hover { border-color: var(--accent); color: var(--accent); }

    /* FOOTER */
    footer {
      background: #E8E4DC; border-top: 1px solid var(--line);
      padding: 32px 0; text-align: center;
    }
    footer .footer-logo { height: 70px; margin: 0 auto 12px; }
    footer p { font-size: 0.88rem; color: #3d3a35; }
    footer a { color: var(--accent-dark); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* REVEAL */
    .reveal { opacity: 0; transform: translateY(16px); transition: opacity 0.45s ease, transform 0.45s ease; }
    .reveal.visible { opacity: 1; transform: none; }

    /* INFO INLINE - aparece em telas menores que 1100px no lugar do sidebar */
    .info-inline-mobile { display: none; }

    @media (max-width: 1100px) {
      .detalhe-sidebar { display: none !important; }
      .info-inline-mobile {
        display: block; margin-bottom: 28px;
      }
      .iim-valor {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 2rem; font-weight: 900; color: var(--accent-dark);
        line-height: 1; margin-bottom: 6px;
      }
      .iim-valor small { font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 400; color: var(--muted); }
      .iim-consulte { font-size: 1rem; color: var(--muted); margin-bottom: 6px; }
      .iim-divider { border: none; border-top: 1px solid var(--line); margin: 14px 0; }
      .iim-rows { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
      .iim-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
      .iim-row .s-label { color: var(--muted); }
      .iim-row .s-val { font-weight: 600; color: var(--text); }
    }

    @media (max-width: 768px) {
      .nav-inner { padding: 4px 16px; }
      .nav-logo  { height: 56px; }
      .galeria   { height: 240px; border-radius: 0; }
      .galeria-thumbs { margin-top: 8px; }
      .detalhe-wrap { margin: 20px 0 48px; gap: 24px; }
      .detalhe-titulo { font-size: clamp(1.2rem, 5vw, 1.7rem); }
      .detalhe-bairro { margin-bottom: 16px; }
      .features-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; }
      .feature-item { padding: 10px 8px; }
      .feature-val { font-size: 1rem; }
      .iim-valor { font-size: 1.7rem; }
      .cta-banner { padding: 40px 0; }
      .cta-banner h2 { font-size: clamp(1.2rem, 5vw, 1.8rem); }
      .bairro-wrap { padding: 18px 20px; }
    }
  </style>
</head>

  <!-- FOOTER -->

      <img src="./logo.png" alt="Isaque Brito" class="footer-logo">

  <script>
    const SUPABASE_URL  = 'https://lzouqfwxqtorygbzmhik.supabase.co'
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx6b3VxZnd4cXRvcnlnYnptaGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NTM3MTMsImV4cCI6MjA5NzAyOTcxM30.dBPiX2dWjS9FB7XCYBB55HYpA-IhKPzbNkTBxoqMYRg'
    const TENANT_ID     = 'cc8a6855-04df-4c18-bbc7-d8f8bb1c708b'
    const WA_NUMBER     = '5511945713837'

    const tipoLabel = { casa: 'Casa', apto: 'Apartamento', terreno: 'Terreno', comercial: 'Comercial', sala: 'Sala' }

    const diferencialConfig = {
      'Piscina':             { icon: '🏊' },
      'Salão de festas':     { icon: '🎉' },
      'Academia':            { icon: '💪' },
      'Lazer / Playground':  { icon: '🎪' },
      'Churrasqueira':       { icon: '🍖' },
      'Área gourmet':        { icon: '🍽️' },
      'Varanda / Sacada':    { icon: '🌅' },
      'Portaria 24h':        { icon: '🔒' },
      'Condomínio fechado':  { icon: '🏘️' },
      'Elevador':            { icon: '🛗' },
      'Gerador':             { icon: '⚡' },
      'Jardim':              { icon: '🌿' },
      'Quadra esportiva':    { icon: '⚽' },
      'Pet friendly':        { icon: '🐾' },
    }

    function formatValor(v) {
      if (!v) return null
      return 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 0 })
    }

    let fotoAtual = 0
    let fotos = []

    function trocarFoto(idx) {
      if (!fotos.length) return
      fotoAtual = (idx + fotos.length) % fotos.length
      document.getElementById('galeria-main').style.backgroundImage = `url('${fotos[fotoAtual]}')`
      document.querySelectorAll('.galeria-thumb').forEach((t, i) => t.classList.toggle('active', i === fotoAtual))
      const count = document.getElementById('galeria-count')
      if (count) count.textContent = `${fotoAtual + 1} / ${fotos.length}`
    }

    function bairroBlurb(bairro) {
      if (!bairro) return ''
      return `
        <div class="bairro-wrap reveal">
          <div class="secao-titulo">Localização</div>
          <p>
            Situado em <strong>${bairro}</strong>, um dos bairros mais tradicionais da zona norte de São Paulo.
            Fácil acesso a transporte público, comércio local, escolas e serviços essenciais —
            tudo o que você precisa a poucos minutos de casa.
          </p>
        </div>`
    }

    function renderDetalhe(im) {
      document.title = `${im.endereco} | Isaque Brito Corretor`

      fotos = Array.isArray(im.fotos) && im.fotos.length ? im.fotos : []
      const modalidade = im.modalidade || 'venda'
      const valorFmt   = formatValor(im.valor)
      const waMsg      = encodeURIComponent(`Olá Isaque, vi o imóvel "${im.endereco}" no site e quero agendar uma visita.`)
      const waMsgGeral = encodeURIComponent(`Olá Isaque, vi o imóvel "${im.endereco}" no site e gostaria de mais informações.`)

      const features = []
      if (im.area_m2)   features.push({ icon: '📐', val: `${im.area_m2} m²`, label: 'Área útil' })
      if (im.quartos)   features.push({ icon: '🛏', val: im.quartos,  label: im.quartos  === 1 ? 'Quarto'   : 'Quartos'   })
      if (im.suites)    features.push({ icon: '🛁', val: im.suites,   label: im.suites   === 1 ? 'Suite'    : 'Suites'    })
      if (im.banheiros) features.push({ icon: '🚿', val: im.banheiros,label: im.banheiros=== 1 ? 'Banheiro' : 'Banheiros' })
      if (im.vagas)     features.push({ icon: '🚗', val: im.vagas,    label: im.vagas    === 1 ? 'Vaga'     : 'Vagas'     })

      const sidebarRows = []
      if (tipoLabel[im.tipo]) sidebarRows.push({ label: 'Tipo',      val: tipoLabel[im.tipo] })
      if (im.bairro)          sidebarRows.push({ label: 'Bairro',    val: im.bairro })
      if (im.area_m2)         sidebarRows.push({ label: 'Área',      val: `${im.area_m2} m²` })
      if (im.quartos)         sidebarRows.push({ label: 'Quartos',   val: im.quartos })
      if (im.banheiros)       sidebarRows.push({ label: 'Banheiros', val: im.banheiros })
      if (im.vagas)           sidebarRows.push({ label: 'Vagas',     val: im.vagas })

      const diferenciais = Array.isArray(im.diferenciais) && im.diferenciais.length ? im.diferenciais : []
      const difHtml = diferenciais.length ? `
        <div class="diferenciais-wrap reveal">
          <div class="secao-titulo">O que este imóvel oferece</div>
          <div class="diferenciais-grid">
            ${diferenciais.map(d => {
              const cfg = diferencialConfig[d]
              return `<span class="dif-item"><span class="dif-icon">${cfg ? cfg.icon : '✓'}</span>${d}</span>`
            }).join('')}
          </div>
        </div>` : ''

      const descHtml = im.descricao ? `
        <div class="reveal">
          <div class="secao-titulo">Sobre o imóvel</div>
          <div class="detalhe-desc">${im.descricao.split('\n').filter(Boolean).map(p => `<p>${p}</p>`).join('')}</div>
        </div>` : ''

      document.getElementById('conteudo').innerHTML = `
        <div class="container">
          <nav class="breadcrumb">
            <a href="imoveis.html">Imóveis</a>
            <span>/</span>
            <span>${im.endereco}</span>
          </nav>

          ${fotos.length ? `
          <div class="galeria">
            <div id="galeria-main" style="width:100%;height:100%;background-image:url('${fotos[0]}');background-size:cover;background-position:center;"></div>
            ${fotos.length > 1 ? `
            <div class="galeria-nav">
              <button class="galeria-btn" onclick="trocarFoto(fotoAtual-1)" aria-label="Anterior">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="10 4 6 8 10 12"/>
                </svg>
              </button>
              <button class="galeria-btn" onclick="trocarFoto(fotoAtual+1)" aria-label="Próxima">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="6 4 10 8 6 12"/>
                </svg>
              </button>
            </div>
            <div class="galeria-count" id="galeria-count">1 / ${fotos.length}</div>
            ` : ''}
          </div>
          ${fotos.length > 1 ? `
          <div class="galeria-thumbs">
            ${fotos.map((f, i) => `<div class="galeria-thumb ${i === 0 ? 'active' : ''}" style="background-image:url('${f}')" onclick="trocarFoto(${i})"></div>`).join('')}
          </div>` : ''}
          ` : ''}

          <div class="detalhe-wrap">
            <!-- COLUNA ESQUERDA -->
            <div class="detalhe-main">
              <div class="detalhe-tipo reveal">${tipoLabel[im.tipo] || im.tipo || ''} para ${modalidade === 'aluguel' ? 'Aluguel' : 'Venda'}</div>
              <h1 class="detalhe-titulo reveal">${im.endereco}</h1>
              ${im.bairro ? `<p class="detalhe-bairro reveal">${im.bairro}, São Paulo</p>` : ''}

              <div class="info-inline-mobile reveal">
                ${valorFmt
                  ? `<div class="iim-valor">${valorFmt}${modalidade === 'aluguel' ? '<small>/mês</small>' : ''}</div>`
                  : `<div class="iim-consulte">Consulte o valor</div>`
                }
                <span class="sidebar-modalidade modalidade-${modalidade}">${modalidade === 'aluguel' ? 'Aluguel' : 'Venda'}</span>
                ${sidebarRows.length ? `
                <hr class="iim-divider">
                <div class="iim-rows">
                  ${sidebarRows.map(r => `
                    <div class="iim-row">
                      <span class="s-label">${r.label}</span>
                      <span class="s-val">${r.val}</span>
                    </div>
                  `).join('')}
                </div>` : ''}
                <a href="https://wa.me/${WA_NUMBER}?text=${waMsg}" class="btn-whatsapp" target="_blank" rel="noopener">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                  </svg>
                  Quero agendar uma visita
                </a>
              </div>

              ${features.length ? `
              <div class="features-grid reveal">
                ${features.map(f => `
                  <div class="feature-item">
                    <div class="feature-icon">${f.icon}</div>
                    <span class="feature-val">${f.val}</span>
                    <span class="feature-label">${f.label}</span>
                  </div>
                `).join('')}
              </div>` : ''}

              ${descHtml}
              ${difHtml}
              ${bairroBlurb(im.bairro)}
            </div>

            <!-- SIDEBAR -->
            <aside class="detalhe-sidebar reveal">
              <span class="sidebar-modalidade modalidade-${modalidade}">
                ${modalidade === 'aluguel' ? 'Aluguel' : 'Venda'}
              </span>
              ${valorFmt
                ? `<div class="sidebar-valor">${valorFmt}${modalidade === 'aluguel' ? '<small>/mês</small>' : ''}</div>`
                : `<div class="sidebar-consulte">Consulte o valor</div>`
              }

              <hr class="sidebar-divider">

              ${sidebarRows.length ? `
              <div class="sidebar-info">
                ${sidebarRows.map(r => `
                  <div class="sidebar-info-row">
                    <span class="s-label">${r.label}</span>
                    <span class="s-val">${r.val}</span>
                  </div>
                `).join('')}
              </div>
              <hr class="sidebar-divider">` : ''}

              <p class="sidebar-label-cta">Isaque responde em minutos pelo WhatsApp</p>
              <a href="https://wa.me/${WA_NUMBER}?text=${waMsg}" class="btn-whatsapp" target="_blank" rel="noopener">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                </svg>
                Quero agendar uma visita
              </a>

              <div class="sidebar-garantia">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
                Mais de 20 anos de experiência em Pirituba e Freguesia do Ó
              </div>

              <a href="imoveis.html" class="btn-voltar">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="10 4 6 8 10 12"/>
                </svg>
                Ver todos os imóveis
              </a>
            </aside>
          </div>
        </div>

        <!-- CTA BANNER -->
        <div class="cta-banner">
          <div class="cta-banner-inner">
            <h2>Pronto para conhecer pessoalmente?</h2>
            <p>Agende uma visita sem compromisso. Isaque te acompanha em cada detalhe — da planta à documentação.</p>
            <div class="cta-banner-btns">
              <a href="https://wa.me/${WA_NUMBER}?text=${waMsg}" class="btn-cta-primary" target="_blank" rel="noopener">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                </svg>
                Agendar visita
              </a>
              <a href="imoveis.html" class="btn-cta-secondary">Ver outros imóveis</a>
            </div>
          </div>
        </div>
      `

      requestAnimationFrame(() => {
        document.querySelectorAll('.reveal').forEach((el, i) => {
          setTimeout(() => el.classList.add('visible'), i * 70)
        })
      })

      setupGaleriaSwipe()
    }

    function setupGaleriaSwipe() {
      const galeria = document.querySelector('.galeria')
      if (!galeria || fotos.length <= 1) return
      let startX = 0
      galeria.addEventListener('touchstart', e => { startX = e.touches[0].clientX }, { passive: true })
      galeria.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - startX
        if (Math.abs(dx) > 40) trocarFoto(fotoAtual + (dx < 0 ? 1 : -1))
      }, { passive: true })
    }

    async function carregarImovel() {
      const id = new URLSearchParams(location.search).get('id')
      if (!id) {
        document.getElementById('conteudo').innerHTML = `
          <div class="state-msg">Imóvel não encontrado. <a href="imoveis.html" style="color:var(--accent-dark)">Ver todos</a></div>`
        return
      }
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/imoveis?id=eq.${id}&tenant_id=eq.${TENANT_ID}&select=*&limit=1`,
          { headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` } }
        )
        if (!res.ok) throw new Error()
        const data = await res.json()
        if (!data.length) throw new Error()
        renderDetalhe(data[0])
      } catch {
        document.getElementById('conteudo').innerHTML = `
          <div class="state-msg">Não foi possível carregar o imóvel. <a href="imoveis.html" style="color:var(--accent-dark)">Voltar</a></div>`
      }
    }

    carregarImovel()
  </script>
</body>
</html>
